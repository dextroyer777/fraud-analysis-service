# ==============================================================
# CONFIGURAÇÕES DO SERVIÇO
# ==============================================================
spring.application.name=fraud-analysis-service
server.port=8080

# ATIVAÇÃO DAS VIRTUAL THREADS (JAVA 21 + SPRING BOOT 4)
# Essencial para processar milhares de transações sem travar o I/O
spring.threads.virtual.enabled=true

# APACHE KAFKA
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=fraud-group-1

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Auto-offset
spring.kafka.consumer.auto-offset-reset=earliest

# ==============================================================
# REDIS (DETECÇÃO DE FRAUDE)
# ==============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ==============================================================
# OBSERVABILIDADE (ACTUATOR + PROMETHEUS)
# ==============================================================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=spring-boot-app

